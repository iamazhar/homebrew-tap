name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          cat > Formula/asc.rb << 'FORMULA'
          class Asc < Formula
            desc "AI-native CLI for App Store Connect"
            homepage "https://github.com/iamazhar/appstore-connect-cli"
            url "${{ github.event.client_payload.url }}"
            sha256 "${{ github.event.client_payload.sha256 }}"
            license "MIT"

            def install
              bin.install "asc"
            end

            test do
              assert_match "asc", shell_output("#{bin}/asc --help")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/asc.rb
          git commit -m "Update asc to ${{ github.event.client_payload.version }}"
          git push
